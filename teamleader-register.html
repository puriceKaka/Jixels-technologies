<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Team Leader Account • MAPPHEX</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="images/enterprise-icon-192.png" type="image/png" />
    <link rel="stylesheet" href="director.css" />
    <link rel="stylesheet" href="teamleader.css" />    <link rel="stylesheet" href="enterprise-platform.css" />

  </head>
  <body data-page="teamleader-register">
    <main class="auth-shell">
      <section class="auth-card" aria-label="Team leader registration">
        <header class="auth-header">
          <h1>MAPPHEX</h1>
          <p class="muted">Team leader account setup</p>
        </header>

        <form id="teamleader-register-form" class="auth-form" autocomplete="off">
          <label class="field">
            <span>Branch</span>
            <select id="branchId" name="branchId" required></select>
          </label>

          <label class="field">
            <span>Username</span>
            <input id="username" name="username" type="text" placeholder="e.g. nyali-teamlead" required />
          </label>

          <label class="field">
            <span>Email</span>
            <input id="email" name="email" type="email" placeholder="e.g. leader@gmail.com" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input id="password" name="password" type="password" placeholder="Create a strong password" minlength="8" required />
          </label>

          <label class="field">
            <span>Confirm password</span>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Re-enter password" minlength="8" required />
          </label>

          <button class="btn primary" type="submit">Create account</button>

          <p id="teamleader-register-error" class="form-error" role="alert" aria-live="polite"></p>

          <p class="muted" style="margin: 0; font-size: 13px;">
            Already have an account?
            <a href="teamleader-login.html" style="text-decoration: underline;">Login</a>
          </p>
        </form>

        <footer class="auth-footer muted">
          Admin must approve this account before login.
        </footer>
      </section>
    </main>






    <script src="enterprise-core.js"></script>
<script src="kv-client.js"></script>
    <script src="enterprise-store.js"></script>
    <script src="enterprise-platform.js"></script>





<script src="teamleader-register.js"></script>





<script src="pwa.js"></script>
  </body>
</html>
