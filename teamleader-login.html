<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Leader Login • Jixels Technologies</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="images/jixels-icon-192.png" type="image/png" />
    <link rel="stylesheet" href="director.css" />
    <link rel="stylesheet" href="teamleader.css" />
  </head>
  <body data-page="teamleader-login">
    <main class="auth-shell">
      <section class="auth-card" aria-label="Team leader login">
        <header class="auth-header">
          <h1>Jixels Technologies</h1>
          <p class="muted">Team leader portal</p>
        </header>

        <form id="teamleader-login-form" class="auth-form" autocomplete="off">
          <label class="field">
            <span>Email or Username</span>
            <input id="identifier" name="identifier" type="text" placeholder="e.g. leader@gmail.com" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input id="password" name="password" type="password" placeholder="Create a strong password" required />
          </label>

          <button id="teamleader-login-btn" class="btn primary" type="submit">Login</button>

          <label class="remember-row">
            <input id="rememberMe" type="checkbox" />
            <span class="muted">Remember me</span>
          </label>

          <p id="teamleader-login-error" class="form-error" role="alert" aria-live="polite"></p>

          <p class="muted" style="margin: 0; font-size: 13px;">
            Don’t have a team leader account?
            <a href="teamleader-register.html" style="text-decoration: underline;">Create account</a>
          </p>
        </form>

        <footer class="auth-footer muted">
          Team leaders allocate branch phones to agents by IMEI or serial number.
        </footer>
      </section>
    </main>

    <script src="kv-client.js"></script>
    <script src="jixels-store.js"></script>
    <script src="teamleader-login.js"></script>
    <script src="pwa.js"></script>
  </body>
</html>
